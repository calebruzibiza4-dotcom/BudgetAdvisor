services:
  - type: web
    name: budget-advisor-backend
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://your-deployed-frontend-url.com
      - key: NODE_ENV
        value: production
